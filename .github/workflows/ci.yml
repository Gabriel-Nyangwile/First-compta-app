name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  quick:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        ports: [ '5432:5432' ]
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: first_compta_ci
        options: >-
          --health-cmd="pg_isready -U postgres" --health-interval=5s --health-timeout=5s --health-retries=10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/first_compta_ci?schema=public
      NODE_ENV: test
      BASE_URL: http://localhost:3000
      HEALTH_BASE: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env.local for CI
        run: |
          cat <<'EOF' > .env.local
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/first_compta_ci?schema=public
          NODE_ENV=test
          BASE_URL=http://localhost:3000
          EOF

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Seed minimal data
        run: node scripts/seed-minimal.js

      - name: Seed payroll config
        run: node scripts/seed-payroll-config.js

      - name: Import plan comptable
        run: node scripts/import-accounts.js

      - name: Quick CI suite
        run: npm run ci:quick

      - name: Upload quick audit artifact
        if: always()
        run: |
          mkdir -p artifacts
          node --env-file=.env.local scripts/run-audit-pack.js quick > artifacts/audit-pack-quick.log 2>&1 || true
        
      - name: Archive artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-quick-logs
          path: artifacts

